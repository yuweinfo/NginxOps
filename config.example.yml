# =====================================================
# NginxOps 配置文件
# 首次启动时，系统将引导您通过 Web 界面完成配置
# =====================================================

# 数据库配置
database:
  # 是否使用外部数据库
  # true: 使用外部 PostgreSQL 数据库
  # false: 使用内置 PostgreSQL 数据库
  useExternal: false
  
  # 外部数据库连接信息 (useExternal=true 时需要配置)
  host: your-db-host
  port: 5432
  name: nginxops
  user: postgres
  password: your-db-password

# JWT 安全配置
jwt:
  # JWT 密钥 (至少32个字符，建议使用随机字符串)
  # 请在生产环境中更改为安全的随机密钥
  secret: "change-this-to-a-secure-random-string-at-least-32-chars"

# 系统配置完成标志 (系统自动设置)
setupDone: true

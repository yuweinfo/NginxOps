services:
  nginxops:
    image: docker.cnb.cool/yuweinfo/nginxops:latest
    container_name: nginxops
    restart: unless-stopped
    network_mode: host
    volumes:
      - nginxops-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  nginxops-data:
    name: nginxops-data
